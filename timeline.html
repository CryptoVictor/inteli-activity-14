<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Timeline de Simulações</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f7f8fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<script>
const simulacoes = [
  { titulo: "Simulação #4", data: "10/05/2026", retorno: "+12,4%", risco: "Baixo",  positivo: true  },
  { titulo: "Simulação #3", data: "05/04/2026", retorno: "+8,1%",  risco: "Médio",  positivo: true  },
  { titulo: "Simulação #2", data: "03/03/2026", retorno: "+5,7%",  risco: "Alto",   positivo: true  },
  { titulo: "Simulação #1", data: "07/01/2026", retorno: "-2,3%",  risco: "Baixo",  positivo: false },
];

const CARD_W  = 160;
const CARD_H  = 108;
const GAP     = 48;
const MARGEM  = 32;
const PASSO   = CARD_W + GAP;
const LINHA_Y = CARD_H + 36;

const AZUL       = [0, 156, 222];
const VERDE      = [34, 197, 94];
const VERMELHO   = [239, 68, 68];
const CINZA_BG   = [247, 248, 250];
const CINZA_LINE = [208, 213, 221];

let offset    = 0;
let dragX     = 0;
let elevacoes = [];

function totalConteudo() {
  return simulacoes.length * CARD_W + (simulacoes.length - 1) * GAP;
}

function maxOffset() {
  return max(0, totalConteudo() + MARGEM * 2 - width);
}

function setup() {
  const cw = min(totalConteudo() + MARGEM * 2, 780);
  createCanvas(cw, LINHA_Y + 28);
  elevacoes = simulacoes.map(() => 0);
}

function mousePressed() { dragX = mouseX; }

function mouseDragged() {
  offset = constrain(offset - (mouseX - dragX), 0, maxOffset());
  dragX = mouseX;
}

function cardRect(cx) {
  return { x: cx - CARD_W / 2, y: 0, w: CARD_W, h: CARD_H };
}

function sobreCard(cx) {
  const r = cardRect(cx);
  return mouseX > r.x && mouseX < r.x + r.w && mouseY > r.y && mouseY < r.y + r.h;
}

function desenhaCard(sim, cx, elev) {
  const x = cx - CARD_W / 2;
  const y = -elev;
  const cor = sim.positivo ? VERDE : VERMELHO;

  drawingContext.shadowColor = `rgba(0,0,0,${0.08 + elev * 0.006})`;
  drawingContext.shadowBlur = 8 + elev * 1.2;
  drawingContext.shadowOffsetY = 2 + elev * 0.4;

  fill(255);
  noStroke();
  rect(x, y, CARD_W, CARD_H, 10);

  drawingContext.shadowColor = 'transparent';
  drawingContext.shadowBlur = 0;
  drawingContext.shadowOffsetY = 0;

  fill(...AZUL);
  noStroke();
  rect(x, y, CARD_W, 4, 10, 10, 0, 0);

  fill(30);
  textAlign(LEFT, TOP);
  textSize(12);
  textStyle(BOLD);
  text(sim.titulo, x + 12, y + 14);

  fill(160);
  textSize(10);
  textStyle(NORMAL);
  text(sim.data, x + 12, y + 30);

  stroke(...CINZA_LINE);
  strokeWeight(1);
  line(x + 12, y + 46, x + CARD_W - 12, y + 46);

  noStroke();
  fill(130);
  textAlign(LEFT, TOP);
  textSize(9);
  text("RETORNO", x + 12, y + 55);
  fill(...cor);
  textSize(13);
  textStyle(BOLD);
  text(sim.retorno, x + 12, y + 66);

  noStroke();
  fill(130);
  textAlign(LEFT, TOP);
  textSize(9);
  textStyle(NORMAL);
  text("RISCO", x + 90, y + 55);
  fill(60);
  textSize(11);
  textStyle(BOLD);
  text(sim.risco, x + 90, y + 67);

  textStyle(NORMAL);

  stroke(...CINZA_LINE);
  strokeWeight(1);
  line(cx, y + CARD_H, cx, LINHA_Y - 7);

  noStroke();
  fill(...AZUL);
  circle(cx, LINHA_Y, elev > 4 ? 13 : 10);
  fill(255);
  circle(cx, LINHA_Y, elev > 4 ? 6 : 4);
}

function draw() {
  background(...CINZA_BG);

  stroke(...CINZA_LINE);
  strokeWeight(2);
  line(0, LINHA_Y, width, LINHA_Y);

  simulacoes.forEach((sim, i) => {
    const cx = MARGEM + i * PASSO + CARD_W / 2 - offset;
    if (cx < -CARD_W || cx > width + CARD_W) return;

    const hover = sobreCard(cx);
    elevacoes[i] = lerp(elevacoes[i], hover ? 8 : 0, 0.14);

    desenhaCard(sim, cx, elevacoes[i]);
  });
}
</script>
</body>
</html>
