<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Timeline</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f5f5f5;
  }
</style>
</head>
<body>
<script>
const eventos = [
  { barras: [0.4, 0.7, 0.5, 0.9], cor: "#e74c3c", nome: "Vendas #1", data: "07/01/2026" },
  { barras: [0.8, 0.3, 0.6, 0.5], cor: "#e67e22", nome: "Vendas #2", data: "03/03/2026" },
  { barras: [0.5, 0.9, 0.4, 0.7], cor: "#3498db", nome: "Receita #1", data: "05/04/2026" },
  { barras: [0.6, 0.5, 0.8, 0.3], cor: "#2ecc71", nome: "Custo #1", data: "10/05/2026" },
];

const TAM = 80;
const GAP = 60;
const MARGEM = 30;
const Y = 150;
const PASSO = TAM + GAP;

let offset = 0;
let escalas = [];
let dragX = 0;

function totalConteudo() {
  return eventos.length * TAM + (eventos.length - 1) * GAP;
}

function setup() {
  createCanvas(totalConteudo() + MARGEM * 2, 320);
  escalas = eventos.map(() => 1);
}

function mousePressed() {
  dragX = mouseX;
}

function mouseDragged() {
  const maxOffset = max(0, totalConteudo() + MARGEM * 2 - width);
  offset = constrain(offset - (mouseX - dragX), 0, maxOffset);
  dragX = mouseX;
}

function desenhaBarras(barras, tam) {
  const pad = 8;
  const area = tam - pad * 2;
  const largBarra = area / barras.length;
  const espaco = 2;

  barras.forEach((v, i) => {
    const bx = -tam / 2 + pad + i * largBarra + espaco / 2;
    const altMax = area * 0.75;
    const alt = v * altMax;
    const by = tam / 2 - pad - alt;
    fill(255, 200);
    noStroke();
    rect(bx, by, largBarra - espaco, alt, 2);
  });
}

function draw() {
  background(245);

  stroke(180);
  strokeWeight(2);
  line(0, Y + TAM / 2, width, Y + TAM / 2);

  eventos.forEach((e, i) => {
    const cx = MARGEM + i * PASSO + TAM / 2 - offset;
    const cy = Y + TAM / 2;

    if (cx < -TAM || cx > width + TAM) return;

    const hover =
      mouseX > cx - TAM / 2 && mouseX < cx + TAM / 2 &&
      mouseY > cy - TAM / 2 && mouseY < cy + TAM / 2;

    escalas[i] = lerp(escalas[i], hover ? 1.3 : 1, 0.15);

    push();
    translate(cx, cy);
    scale(escalas[i]);
    noStroke();
    fill(e.cor);
    rect(-TAM / 2, -TAM / 2, TAM, TAM, 8);
    desenhaBarras(e.barras, TAM);
    fill(50);
    textAlign(CENTER, TOP);
    textSize(11);
    text(e.nome, 0, TAM / 2 + 6);
    fill(120);
    textSize(10);
    text(e.data, 0, TAM / 2 + 20);
    pop();
  });
}
</script>
</body>
</html>
